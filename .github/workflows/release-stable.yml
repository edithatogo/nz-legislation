name: Release Stable

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: release-stable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Version and publish stable release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run lint audit
        run: pnpm lint
        continue-on-error: true

      - name: Run release gate checks
        run: |
          pnpm typecheck
          pnpm test:run
          pnpm build

      - name: Decide publish mode
        id: publish_mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual workflow dispatch" >> "$GITHUB_OUTPUT"
          elif [[ "${{ vars.ENABLE_AUTOMATED_NPM_PUBLISH }}" == "true" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "reason=repository variable ENABLE_AUTOMATED_NPM_PUBLISH=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "reason=automated npm publish is disabled until npm publisher access is verified" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release PR or publish
        id: changesets
        if: steps.publish_mode.outputs.enabled == 'true'
        uses: changesets/action@v1
        with:
          commit: 'chore: version packages'
          title: 'chore: version packages'
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summarize skipped publish
        if: steps.publish_mode.outputs.enabled != 'true'
        run: |
          echo "Skipping npm publish on this run."
          echo "Reason: ${{ steps.publish_mode.outputs.reason }}"
          echo "Use workflow_dispatch after npm publishing access is confirmed."

      - name: Summarize published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Published packages:"
          echo "${{ steps.changesets.outputs.published_packages }}"
