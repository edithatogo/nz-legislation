name: Release Next

on:
  push:
    branches: [next]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-next-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prerelease:
    name: Version and publish prerelease
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run lint audit
        run: pnpm lint
        continue-on-error: true

      - name: Run prerelease gate checks
        run: |
          pnpm typecheck
          pnpm test:run
          pnpm build

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Enter prerelease mode
        run: pnpm exec changeset pre enter next || true

      - name: Version prerelease packages
        run: pnpm exec changeset version

      - name: Refresh lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Commit prerelease versions
        run: |
          if git diff --quiet; then
            echo "No prerelease version changes to commit."
            exit 0
          fi
          git add .changeset package.json pnpm-lock.yaml
          git commit -m "chore: version prerelease packages" || true
          git push origin HEAD:next

      - name: Publish prerelease package
        run: pnpm exec changeset publish --tag next
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Leave prerelease mode
        if: always()
        run: pnpm exec changeset pre exit || true
