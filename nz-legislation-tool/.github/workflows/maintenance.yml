name: Maintenance Automation

on:
  schedule:
    # Run every Monday at 6am NZST (Sunday 6pm UTC)
    - cron: '0 18 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  maintenance:
    runs-on: ubuntu-latest
    name: Repository Maintenance
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      
      - name: 🔒 Security audit
        run: |
          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate >> $GITHUB_STEP_SUMMARY 2>&1 || true
      
      - name: ✨ Run linters
        run: |
          echo "## Code Quality" >> $GITHUB_STEP_SUMMARY
          npm run lint >> $GITHUB_STEP_SUMMARY 2>&1 || true
      
      - name: 🔍 Run type check
        run: |
          echo "## Type Check" >> $GITHUB_STEP_SUMMARY
          npm run typecheck >> $GITHUB_STEP_SUMMARY 2>&1 || true
      
      - name: 🧪 Run tests
        run: |
          echo "## Tests" >> $GITHUB_STEP_SUMMARY
          npm test >> $GITHUB_STEP_SUMMARY 2>&1 || true
      
      - name: 📦 Check for outdated dependencies
        run: |
          echo "## Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
          npm outdated >> $GITHUB_STEP_SUMMARY 2>&1 || true
      
      - name: 🗑️ Check for unused dependencies
        run: |
          npx depcheck --ignores="@types/*,eslint,@typescript-eslint/*" || true
      
      - name: ⚡ Run benchmarks
        run: |
          echo "## Performance Benchmarks" >> $GITHUB_STEP_SUMMARY
          npm run bench >> $GITHUB_STEP_SUMMARY 2>&1 || true
      
      - name: 📊 Generate maintenance report
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          
          ## Maintenance Summary
          
          - **Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **Node Version:** $(node --version)
          - **pnpm Version:** $(pnpm --version)
          - **Repository:** ${{ github.repository }}
          
          ### Next Steps
          
          - Review any security vulnerabilities above
          - Check outdated dependencies for updates
          - Review test failures if any
          - Check benchmark results for regressions
          
          EOF
      
      - name: Create issue if problems found
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueBody = `
            ## Maintenance Issues Detected
            
            **Date:** ${new Date().toISOString()}
            **Workflow:** ${process.env.GITHUB_WORKFLOW}
            **Run:** ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}
            
            Please review the maintenance workflow results and address any issues.
            
            ### Common Fixes:
            
            - Run \`npm audit fix\` for security issues
            - Run \`npm run lint -- --fix\` for linting issues
            - Update dependencies with Renovate or manually
            - Review and fix any test failures
            
            ---
            *This issue was automatically created by the Maintenance Automation workflow*
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔧 Maintenance Issues Detected - ${new Date().toISOString().split('T')[0]}`,
              body: issueBody,
              labels: ['maintenance', 'automated']
            });
