name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run format check
        run: pnpm format:check

  lint:
    name: Lint Audit (ESLint)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run ESLint audit
        run: pnpm lint
        continue-on-error: true

  lint-biome:
    name: Lint (Biome)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Biome check
        run: pnpm lint:biome

  lint-oxlint:
    name: Lint (Oxlint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Oxlint check
        run: pnpm lint:oxlint


  docs-lint:
    name: Docs Lint (Vale)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run Vale
        uses: errata-ai/vale-action@reviewdog
        with:
          files: README.md docs/
          reporter: github-check
          fail_on_error: false

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck

  conductor-requirements:
    name: Conductor Requirements Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Conductor requirements gate
        run: pnpm gate:conductor-requirements
  no-placeholder-legal-data:
    name: No Placeholder Legal Data Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run no placeholder legal data gate
        run: pnpm gate:no-placeholder-legal-data
  provider-capability-manifest:
    name: Provider Capability Manifest Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run provider capability manifest gate
        run: pnpm gate:provider-capability-manifest
  provider-aware-mcp-export:
    name: Provider Aware MCP Export Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run provider aware mcp export gate
        run: pnpm gate:provider-aware-mcp-export
  website-docs:
    name: Website Docs Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run website docs gate
        run: pnpm gate:website-docs
  manifest-docs:
    name: Manifest Docs Drift Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run manifest/docs drift gate
        run: pnpm gate:manifest-docs
  install-snippets:
    name: Install Snippet Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run install snippet gate
        run: pnpm gate:install-snippets
  security-provenance:
    name: Security Provenance Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run security/provenance gate
        run: pnpm gate:security-provenance
  release-notes:
    name: Release Notes Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run release notes gate
        run: pnpm gate:release-notes
  package-metadata:
    name: Package Metadata Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run package metadata gate
        run: pnpm gate:package-metadata
  channel-readiness:
    name: Channel Readiness Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run channel readiness gate
        run: pnpm gate:channel-readiness
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm test:run
        env:
          CI: true

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      [
        format,
        lint,
        lint-biome,
        lint-oxlint,

        typecheck,
        conductor-requirements,
        website-docs,
        channel-readiness,
        provider-aware-mcp-export,
        provider-capability-manifest,
        no-placeholder-legal-data,
        manifest-docs,
        install-snippets,
        security-provenance,
        release-notes,
        package-metadata,
        test,
      ]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Verify build artifacts
        run: |
          test -f dist/cli.js
          test -f dist/mcp-cli.js

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
