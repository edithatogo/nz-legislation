# RegEx Issue Labeler configuration.
# github/issue-labeler@v3 expects each label to map to a list of regex strings.
# Branch-based matching belongs to PR labeler workflows and is intentionally
# not mixed into this issue-body labeler configuration.

bug:
  - '/\b(bug|error|fail(?:ed|ure)?|broken)\b/i'

enhancement:
  - '/\b(feature|enhancement|improve|add)\b/i'

documentation:
  - '/\b(docs?|documentation|readme|typo)\b/i'

security:
  - '/\b(security|vulnerability|exploit|attack)\b/i'

performance:
  - '/\b(performance|slow|fast|optimi[sz]e|benchmark)\b/i'

testing:
  - '/\b(test(?:ing)?|spec|coverage)\b/i'

dependencies:
  - '/\b(dependenc(?:y|ies)|upgrade|update)\b/i'

'priority: critical':
  - '/\b(critical|urgent|emergency|blocking)\b/i'

'priority: high':
  - '/\b(high|important|urgent)\b/i'

'priority: medium':
  - '/\b(medium|normal)\b/i'

'priority: low':
  - '/\b(low|minor|nice[ .-]?to[ .-]?have)\b/i'
