name: Legacy Tag Release (Manual Only)

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Generate Release Notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const { changelog } = await import('@changesets/changelog-github');

            // Get the previous tag
            const { data: tags } = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 2
            });

            const currentTag = context.ref.replace('refs/tags/', '');
            const previousTag = tags.length > 1 ? tags[1].name : tags[0].name;

            // Get commits between tags
            const { data: compare } = await github.rest.repos.compareCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base: previousTag,
              head: currentTag
            });

            // Generate changelog
            let changes = '';
            const commits = compare.commits;

            const features = [];
            const fixes = [];
            const docs = [];
            const chores = [];

            commits.forEach(commit => {
              const message = commit.commit.message;
              const sha = commit.sha.substring(0, 7);
              
              if (message.startsWith('feat:')) {
                features.push(`- ${message.replace('feat:', '').trim()} (${sha})`);
              } else if (message.startsWith('fix:')) {
                fixes.push(`- ${message.replace('fix:', '').trim()} (${sha})`);
              } else if (message.startsWith('docs:')) {
                docs.push(`- ${message.replace('docs:', '').trim()} (${sha})`);
              } else if (message.startsWith('chore:')) {
                chores.push(`- ${message.replace('chore:', '').trim()} (${sha})`);
              }
            });

            let changelog = `## 🎉 Release ${currentTag}\n\n`;

            if (features.length > 0) {
              changelog += `### ✨ Features\n\n${features.join('\n')}\n\n`;
            }
            if (fixes.length > 0) {
              changelog += `### 🐛 Bug Fixes\n\n${fixes.join('\n')}\n\n`;
            }
            if (docs.length > 0) {
              changelog += `### 📚 Documentation\n\n${docs.join('\n')}\n\n`;
            }
            if (chores.length > 0) {
              changelog += `### 🔧 Maintenance\n\n${chores.join('\n')}\n\n`;
            }

            changelog += `**Full Changelog**: ${compare.html_url}`;

            core.setOutput('changelog', changelog);

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.changelog }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: |
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
