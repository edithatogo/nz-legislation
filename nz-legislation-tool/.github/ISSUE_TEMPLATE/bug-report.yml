name: Bug Report
description: Report a bug or unexpected behavior
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.
        
  - type: checkboxes
    id: checks
    attributes:
      label: Preliminary Checks
      description: Please confirm you've completed these steps before reporting
      options:
        - label: I've searched existing issues
          required: true
        - label: I've checked the documentation
          required: true
        - label: I'm using the latest version
          required: false
  
  - type: input
    id: version
    attributes:
      label: Package Version
      description: What version are you using?
      placeholder: "1.0.1"
    validations:
      required: true
  
  - type: input
    id: node
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v20.x.x"
    validations:
      required: true
  
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug
    validations:
      required: true
  
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the behavior
      placeholder: |
        1. Run command '...'
        2. With options '...'
        3. See error '...'
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      render: shell
    validations:
      required: true
  
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information, logs, or screenshots
      render: shell
    validations:
      required: false
