name: Publish GitHub Package Mirror

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: publish-github-package-mirror-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-github-package-mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@edithatogo'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mirror gate checks
        run: |
          pnpm gate:no-placeholder-legal-data
          pnpm gate:provider-capability-manifest
          pnpm gate:provider-aware-mcp-export
          pnpm gate:package-metadata
          pnpm gate:manifest-docs
          pnpm gate:website-docs
          pnpm gate:install-snippets

          pnpm gate:channel-readiness
          pnpm gate:security-provenance
          pnpm gate:release-notes
      - name: Build package
        run: pnpm run build

      - name: Prepare GitHub Packages manifest
        shell: bash
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));

          pkg.name = '@edithatogo/nz-legislation-tool';
          pkg.publishConfig = {
            registry: 'https://npm.pkg.github.com'
          };

          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`);
          EOF

      - name: Publish mirror package to GitHub Packages
        run: |
          if node -e "process.exit(require('./package.json').private === true ? 0 : 1)"; then
            echo "package.json is private; publication remains externally gated."
            exit 0
          fi
          pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
