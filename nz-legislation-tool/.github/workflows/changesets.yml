name: Changesets Version and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:
  version:
    name: Version and Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      published_packages: ${{ steps.changesets.outputs.published_packages }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore: version packages"
          title: "chore: version packages"
          publish: pnpm changeset publish
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Show published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Published packages:"
          echo "${{ steps.changesets.outputs.published_packages }}"

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [version]
    if: needs.version.outputs.published == 'true'
    steps:
      - name: Send release notification
        uses: actions/github-script@v7
        with:
          script: |
            const packages = process.env.PUBLISHED_PACKAGES || '';
            console.log(`Released packages: ${packages}`);
            
            // You can add Slack/Discord notifications here
            // For example, using a webhook:
            // await fetch(process.env.SLACK_WEBHOOK_URL, {
            //   method: 'POST',
            //   body: JSON.stringify({ text: `New release published: ${packages}` })
            // });
        env:
          PUBLISHED_PACKAGES: ${{ needs.version.outputs.published_packages }}
