name: Release Stable

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: release-stable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Version and publish stable release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: stable

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@11.5.1
          npm --version

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run lint audit
        run: pnpm lint
        continue-on-error: true

      - name: Run release gate checks
        run: |
          pnpm typecheck
          pnpm test:run
          pnpm build

      - name: Decide publish mode
        id: publish_mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual workflow dispatch" >> "$GITHUB_OUTPUT"
          elif [[ "${{ vars.ENABLE_AUTOMATED_NPM_PUBLISH }}" == "true" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "reason=repository variable ENABLE_AUTOMATED_NPM_PUBLISH=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "reason=automated npm publish is disabled until npm publisher access is verified" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate stable release shape
        if: steps.publish_mode.outputs.enabled == 'true'
        shell: bash
        run: |
          pending_changesets=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          if [[ "$pending_changesets" != "0" ]]; then
            echo "Pending changeset files detected."
            echo "Stable trusted publishing is configured for already-versioned releases only."
            echo "Version and commit the package before running the stable publish workflow."
            exit 1
          fi

      - name: Publish stable package
        id: publish
        if: steps.publish_mode.outputs.enabled == 'true'
        shell: bash
        run: |
          package_name=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")
          package_version=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          published_version=$(npm view "$package_name" version 2>/dev/null || true)

          echo "package_name=$package_name" >> "$GITHUB_OUTPUT"
          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

          if [[ "$package_version" == "$published_version" ]]; then
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Package $package_name@$package_version is already published."
            exit 0
          fi

          npm publish --provenance --access public
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Summarize skipped publish
        if: steps.publish_mode.outputs.enabled != 'true'
        run: |
          echo "Skipping npm publish on this run."
          echo "Reason: ${{ steps.publish_mode.outputs.reason }}"
          echo "Use workflow_dispatch after npm publishing access is confirmed."

      - name: Summarize published packages
        if: steps.publish.outputs.published == 'true'
        run: |
          echo "Published packages:"
          echo "${{ steps.publish.outputs.package_name }}@${{ steps.publish.outputs.package_version }}"
