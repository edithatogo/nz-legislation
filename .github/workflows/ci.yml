name: CI

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run format check
        run: pnpm format:check

  lint:
    name: Lint Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run lint audit
        run: pnpm lint
        continue-on-error: true

  docs-lint:
    name: Docs Lint (Vale)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run Vale
        uses: errata-ai/vale-action@reviewdog
        with:
          files: README.md docs/
          reporter: github-check
          fail_on_error: false

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: ['18', '20', '22']

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm test:run
        env:
          CI: true

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [format, lint, typecheck, test]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.29.3 --activate

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Verify build artifacts
        run: |
          test -f dist/cli.js
          test -f dist/mcp-cli.js

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7
